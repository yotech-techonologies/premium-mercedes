<!DOCTYPE html>
<html>
<head>

<style>

    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;

.checkout-box{
    background:white;
    padding:30px;
    border-radius:10px;

button{
    background:#0070ba;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>

</head>
<body>

<div class="checkout-box">

    <h2>Pay with PayPal</h2>

    <p>Merchant:</p>
    <strong>ghereyoma@gmail.com</strong>

    <h3>Total: $100.00</h3>

    <button onclick="payNow()">
        Pay Now
    </button>

</div>

<script>
function payNow(){
    alert("Demo Payment Successful!\n\nPayment sent to:\nghereyoma@gmail.com");
    window.location.href="index.html";
}
</script>

</body>
