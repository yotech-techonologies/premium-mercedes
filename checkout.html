<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.checkout{
    width:420px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.header{
    background:#0070ba;
    color:#fff;
    text-align:center;
    padding:25px;
}

.header h2{
    font-size:30px;
    margin-bottom:5px;
}

.header p{
    opacity:.9;
}

.content{
    padding:25px;
}

.summary{
    background:#f6f8fa;
    border-radius:8px;
    padding:15px;
    margin-bottom:20px;
}

.summary h3{
    margin-bottom:10px;
    color:#333;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    color:#555;
}

.total{
    font-size:22px;
    font-weight:bold;
    color:#000;
    border-top:1px solid #ddd;
    padding-top:12px;
    margin-top:12px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#555;
    font-weight:bold;
}

input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:18px;
    font-size:15px;
}

.pay-btn{
    width:100%;
    background:#ffc439;
    color:#111;
    border:none;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.pay-btn:hover{
    background:#ffb700;
}

.secure{
    text-align:center;
    margin-top:18px;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="checkout">

<div class="header">
<h2>Checkout</h2>
<p>Complete your purchase</p>
</div>

<div class="content">

<div class="summary">

<h3>Order Summary</h3>

<div class="row">
<span>Mercedes Vehicle</span>
<span>$29,500</span>
</div>

<div class="row">
<span>Shipping</span>
<span>Free</span>
</div>

<div class="row total">
<span>Total</span>
<span>$29,500</span>
</div>

</div>

<label>Merchant</label>

<input type="text"
value="ghereyoma@gmail.com"
readonly>

<label>Your Email</label>

<input
type="email"
placeholder="Enter your email">

<button class="pay-btn" onclick="payNow()">
Pay with PayPal
</button>

<div class="secure">
🔒 Secure Checkout
</div>

</div>

</div>

<script>

function payNow(){

alert(
"Demo Checkout\n\n"+
"Payment would be sent to:\n"+
"ghereyoma@gmail.com"
);

window.location.href="index.html";

}

</script>

</body>
</html>
