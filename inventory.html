<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>

<link rel="stylesheet" href="style.css">

<script>
function addToCart(name, price, image){

    const car = {
        name: name,
        price: price,
        image: image
    };

    localStorage.setItem("cart", JSON.stringify(car));

    window.location.href = "cart.html";
}
</script>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="inventory.html">Inventory</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="cart.html">Cart</a>
</nav>

<h1 style="text-align:center;">Mercedes Inventory</h1>

<div class="grid">

<div class="card">
<img src="images/car1.jpg">
<h3>Mercedes C-Class</h3>
<p>$35,000</p>
<button onclick="addToCart('Mercedes C-Class',35000,'images/car1.jpg')">
Add to Cart
</button>
</div>

<div class="card">
<img src="images/car2.jpg">
<h3>Mercedes E-Class</h3>
<p>$52,000</p>
<button onclick="addToCart('Mercedes E-Class',52000,'images/car2.jpg')">
Add to Cart
</button>
</div>

<div class="card">
<img src="images/car3.jpg">
<h3>Mercedes GLE</h3>
<p>$70,000</p>
<button onclick="addToCart('Mercedes GLE',70000,'images/car3.jpg')">
Add to Cart
</button>
</div>

</div>

</body>
</html>
